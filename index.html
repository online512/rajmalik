margin:15px;
background:#1da1f2;
padding:15px;

border-radius:12px;

transition:transform 0.2s;

.telegram:hover{

@keyframes pulseGlow{

0%{
transform:scale(1);
box-shadow:0 0 5px #1da1f2,0 0 10px #1da1f2;
}

50%{
transform:scale(1.1);
box-shadow:0 0 20px #1da1f2,0 0 40px #1da1f2;

100%{
transform:scale(1);
box-shadow:0 0 5px #1da1f2,0 0 10px #1da1f2;
